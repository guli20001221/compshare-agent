name: Entity Registry Race

on:
  pull_request:
    paths:
      - ".github/workflows/entity-race.yml"
      - "internal/entity/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

jobs:
  entity-race:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run entity race tests
        run: go test ./internal/entity -race -count=1
