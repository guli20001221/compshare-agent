# nfpm package spec for `compshare-agent` (RPM, linux/amd64).
#
# Build with: `just rpm` (cross-compiles linux binary first, then runs nfpm pkg).
# Install:    `rpm -i dist/compshare-agent-<version>-1.x86_64.rpm`
#
# Layout: everything installs under /data/yuanpeng.wei/compshare-agent/.
# The runtime-loaded paths (deploy/kb/, scripts/rag_w0/) are kept as
# subdirectories of that root so the binary's relative-path contract holds.
# See cmd/trace.go:defaultKnowledgeCorpusPath and policy/leakage.go.
#
# Process supervision is handled by `ally`; postinstall runs `ally invite`
# automatically when /data/yuanpeng.wei/compshare-agent/env exists.

name: "compshare-agent"
arch: "amd64"
platform: "linux"
version: "${VERSION}"
release: "1"
section: "default"
priority: "extra"
maintainer: "CompShare <noreply@compshare.cn>"
description: |
  CompShare console AI agent — HTTP gateway with RAG retrieval over the
  customer-safe FAQ corpus. Read-only by default; mutating tools are
  gated by COMPSHARE_ENABLE_MUTATING_TOOLS=1.
vendor: "CompShare"
homepage: "https://www.compshare.cn"
license: "Proprietary"

contents:
  # Binary
  - src: "./compshare-agent"
    dst: "/data/yuanpeng.wei/compshare-agent/compshare-agent"
    file_info:
      mode: 0755

  # Knowledge corpus (mandatory for any RAG mode)
  - src: "./deploy/kb/stage2b_w0.jsonl"
    dst: "/data/yuanpeng.wei/compshare-agent/deploy/kb/stage2b_w0.jsonl"
    file_info:
      mode: 0644

  # qwen3 embedding sidecar (mandatory for default qwen3_rrf mode)
  - src: "./deploy/kb/embeddings_d7bc9b72d02770acdf5aca5253c98fc642d3d3189e5b0c0b9b743fdc1fc5e00b_qwen3-embedding-8b.jsonl"
    dst: "/data/yuanpeng.wei/compshare-agent/deploy/kb/embeddings_d7bc9b72d02770acdf5aca5253c98fc642d3d3189e5b0c0b9b743fdc1fc5e00b_qwen3-embedding-8b.jsonl"
    file_info:
      mode: 0644

  # Staff-name leakage guard list
  - src: "./scripts/rag_w0/staff_names.txt"
    dst: "/data/yuanpeng.wei/compshare-agent/scripts/rag_w0/staff_names.txt"
    file_info:
      mode: 0644

  # Config template — postinstall copies it to agent.yaml on first install
  # if no agent.yaml exists yet. The .example file itself is always refreshed
  # on upgrade so operators can diff against it.
  - src: "./deploy/conf/agent.yaml.example"
    dst: "/data/yuanpeng.wei/compshare-agent/agent.yaml.example"
    file_info:
      mode: 0644

scripts:
  postinstall: "./deploy/scripts/postinstall.sh"

rpm:
  group: "Applications/Internet"
  compression: "xz"
